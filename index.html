<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>カバエモンのWebサイト</title>

    <style>
        h1{
            color:aquamarine;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        section {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h2 {
            border-left: 5px solid #3498db;
            padding-left: 10px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #2c3e50;
            color: white;
            margin-top: 30px;
        }

        button {
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* ↓ここから追加（カードレイアウト） */
        .card-container {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            background-color: white;
            padding: 20px;
            text-decoration: none;
            color: black;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        p1{
            color:aquamarine;
        }
    </style>
</head>

<body>

<header>
    <h1>カバエモンのゆるゆる発信(不定期更新)</h1>
    <p>とある大学院生(修士課程二年)が好きなことをゆる～く発信していくサイト</p>
</header>

<div class="container">

    <section>
        <h2>サイトについて</h2>
        <p>ITやアニメ,ゲームなど好きなことをゆるく発信していくサイトです．</p>
    </section>

    <!-- ↓ここ追加（ジャンルカード） -->
    <section>
        <h2>ジャンル</h2>

        <div class="card-container">

            <a href="it.html" class="card">
                <h3>IT</h3>
                <p>ITに関する発信はこちらから</p>
                <p1>※現在何も発信していません</p>
            </a>

            <a href="anime.html" class="card">
                <h3>アニメ</h3>
                <p>アニメに関する発信はこちらから</p>
            </a>

            <a href="game.html" class="card">
                <h3>ゲーム</h3>
                <p>ゲームに関する発信はこちらから</p>
                <p1>※現在何も発信していません</p>
            </a>

        </div>
    </section>

    <p>※今後，色々増えていくと思います．</p>

</div>

<footer>
    <p>© 2026 カバエモン</p>
</footer>

</body>
</html>
